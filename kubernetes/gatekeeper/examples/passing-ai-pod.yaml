apiVersion: v1
kind: Pod
metadata:
  name: approved-ai-inference
  labels:
    workload-type: ai
    ai.governance/policy-id: ai-lifecycle-governance
    ai.governance/risk-rating: medium
    ai.governance/owner: ai-platform
  annotations:
    ai.governance/approved: "true"
spec:
  containers:
    - name: inference
      image: public.ecr.aws/docker/library/nginx:1.27
      securityContext:
        privileged: false

