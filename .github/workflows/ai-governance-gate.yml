name: Policy-as-Code Deployment Check

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      scenario:
        description: "Mock AWS AI infrastructure scenario to evaluate"
        required: true
        default: "passed-example.json"
        type: choice
        options:
          - passed-example.json
          - failed-example.json

jobs:
  pac-deployment-check:
    name: OPA/Rego Deployment Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Install OPA CLI
        run: |
          curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x opa
          sudo mv opa /usr/local/bin/opa
          opa version

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.5"

      - name: Terraform validate governance backend
        working-directory: terraform
        run: |
          terraform init -backend=false
          terraform fmt -check -recursive
          terraform validate

      - name: Select deployment check input
        id: scenario
        run: |
          SCENARIO="${{ github.event.inputs.scenario }}"
          if [ -z "$SCENARIO" ]; then
            SCENARIO="passed-example.json"
          fi
          echo "input=mock-infra/$SCENARIO" >> "$GITHUB_OUTPUT"
          echo "Evaluating mock-infra/$SCENARIO"

      - name: Evaluate OPA policy findings
        run: |
          opa eval --format pretty \
            --data policies/ai-lifecycle-governance.rego \
            --input "${{ steps.scenario.outputs.input }}" \
            "data.ai.lifecycle.governance.deny"

      - name: A.6.2 Data Governance Check
        continue-on-error: true
        run: |
          opa eval --fail-defined --format pretty \
            --data policies/ai-lifecycle-governance.rego \
            --input "${{ steps.scenario.outputs.input }}" \
            'data.ai.lifecycle.governance.deny[_].id == "DG-001"'

      - name: A.7.2 Transparency Check
        continue-on-error: true
        run: |
          opa eval --fail-defined --format pretty \
            --data policies/ai-lifecycle-governance.rego \
            --input "${{ steps.scenario.outputs.input }}" \
            'data.ai.lifecycle.governance.deny[_].id == "TR-001"'

      - name: A.8.4 Responsible AI Check
        continue-on-error: true
        run: |
          opa eval --fail-defined --format pretty \
            --data policies/ai-lifecycle-governance.rego \
            --input "${{ steps.scenario.outputs.input }}" \
            'data.ai.lifecycle.governance.deny[_].id == "RAI-001"'

      - name: Security Control - IAM Least Privilege Check
        continue-on-error: true
        run: |
          opa eval --fail-defined --format pretty \
            --data policies/ai-lifecycle-governance.rego \
            --input "${{ steps.scenario.outputs.input }}" \
            'data.ai.lifecycle.governance.deny[_].id == "SEC-001"'

      - name: A.5.2 Impact Assessment Check
        continue-on-error: true
        run: |
          opa eval --fail-defined --format pretty \
            --data policies/ai-lifecycle-governance.rego \
            --input "${{ steps.scenario.outputs.input }}" \
            'data.ai.lifecycle.governance.deny[_].id == "GOV-001"'

      - name: A.5.3 Risk Rating Check
        continue-on-error: true
        run: |
          opa eval --fail-defined --format pretty \
            --data policies/ai-lifecycle-governance.rego \
            --input "${{ steps.scenario.outputs.input }}" \
            'data.ai.lifecycle.governance.deny[_].id == "GOV-002"'

      - name: A.6.1 Production Approval Check
        continue-on-error: true
        run: |
          opa eval --fail-defined --format pretty \
            --data policies/ai-lifecycle-governance.rego \
            --input "${{ steps.scenario.outputs.input }}" \
            'data.ai.lifecycle.governance.deny[_].id == "GOV-003"'

      - name: Gate Decision - Enforce Policy-as-Code Deployment Check
        run: node scripts/pac-deployment-check.mjs "${{ steps.scenario.outputs.input }}"

      - name: Upload compliance evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pac-compliance-evidence
          path: reports/

  blocked-deployment-simulation:
    name: Policy Self-Test - Bad Input Must Be Blocked
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Install OPA CLI
        run: |
          curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x opa
          sudo mv opa /usr/local/bin/opa

      - name: Verify failed example is denied
        run: |
          set +e
          node scripts/pac-deployment-check.mjs mock-infra/failed-example.json
          STATUS=$?
          set -e

          if [ "$STATUS" -eq 0 ]; then
            echo "Expected failed-example.json to be blocked, but it passed."
            exit 1
          fi

          echo "Failed scenario was correctly blocked by Policy-as-Code."
          {
            echo "## Policy Self-Test"
            echo ""
            echo "This job passes only when \`failed-example.json\` is rejected by the deployment gate."
            echo ""
            echo "| Test input | Expected result | Actual result |"
            echo "| --- | --- | --- |"
            echo "| failed-example.json | Blocked / non-zero exit | Blocked / non-zero exit |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Verify passed example is approved
        run: |
          node scripts/pac-deployment-check.mjs mock-infra/passed-example.json
          {
            echo "| passed-example.json | Approved / zero exit | Approved / zero exit |"
            echo ""
            echo "The selected workflow scenario is enforced by the **OPA/Rego Deployment Gate** job. This self-test is separate and proves both negative and positive examples behave correctly."
          } >> "$GITHUB_STEP_SUMMARY"
